# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────────────────
# Streamlit Community Cloud secret management.
#
# HOW TO USE
# ──────────
# Local development:
#   Do NOT use this file locally. Use .env instead (it is gitignored).
#   This file is only read by Streamlit Cloud.
#
# Streamlit Cloud:
#   1. Go to your app dashboard → Settings → Secrets
#   2. Paste the key-value pairs below (without the [section] header if
#      you paste them into the UI text area).
#   3. Save. The app restarts automatically.
#
# SECURITY
# ────────
# • Never commit real API keys to Git.
# • Add ".streamlit/secrets.toml" to your .gitignore.
# • The template below uses placeholder values — replace before deploying.


SARVAM_API_KEY  = "your_sarvam_api_key_here"     # only needed for Hinglish mode
WHISPER_MODEL   = "small"
SARVAM_STT_MODEL = "saaras:v2.5"
